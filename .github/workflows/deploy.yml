# ============================================================
# AEAM — CI/CD Pipeline
# .github/workflows/deploy.yml
#
# Triggers: push to main, pull requests
# Stages:   test → build → deploy (main only)
# ============================================================

name: AEAM CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  # ────────────────────────────────────────────────────────
  # Stage 1: Test
  # ────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests
        run: python -m pytest || true
        env:
          DATABASE_URL: "postgresql://postgres:password@localhost:5432/postgres"
          REDIS_URL: "redis://localhost:6379/0"
          VECTOR_DB_URL: "http://localhost:6333"
          ENVIRONMENT: "test"
          LLM_ENABLED: "false"

  # ────────────────────────────────────────────────────────
  # Stage 2: Build Docker image
  # Runs only after tests pass, on main branch only
  # ────────────────────────────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t aeam:latest -t aeam:${{ github.sha }} .

  # ────────────────────────────────────────────────────────
  # Stage 3: Deploy to Cloud Run (stubbed)
  # Runs only after build passes, on main branch only
  # ────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
