# ============================================================
# AEAM — Google Cloud Run Deployment Manifest
# deploy/cloudrun.yaml
#
# Single-container modular monolith deployment.
# Deploy with:
#   gcloud run services replace deploy/cloudrun.yaml --region REGION
# ============================================================

apiVersion: serving.knative.dev/v1
kind: Service

metadata:
  name: aeam-monolith
  labels:
    app: aeam
    layer: monolith
  annotations:
    # HTTPS-only — reject all plain HTTP traffic.
    run.googleapis.com/ingress: all
    run.googleapis.com/ingress-status: all

spec:
  template:
    metadata:
      annotations:
        # Auto-scaling bounds.
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "5"

        # CPU is always allocated (not throttled between requests).
        run.googleapis.com/cpu-throttling: "false"

    spec:
      # Request timeout — allow long investigations.
      timeoutSeconds: 300

      containers:
        - image: gcr.io/PROJECT_ID/aeam:latest
          name: aeam

          ports:
            - name: http1
              containerPort: 8080

          resources:
            limits:
              cpu: "2"
              memory: 4Gi

          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: aeam-database-url
                  key: latest

            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: aeam-redis-url
                  key: latest

            - name: VECTOR_DB_URL
              valueFrom:
                secretKeyRef:
                  name: aeam-vector-db-url
                  key: latest

            - name: ENVIRONMENT
              value: "production"

            - name: LLM_ENABLED
              value: "false"

            - name: MONITOR_INTERVAL_SECONDS
              value: "300"

            - name: MAX_INVESTIGATION_DEPTH
              value: "5"

          # Liveness probe — restart container if /health fails.
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 10

          # Startup probe — allow extra time for model loading.
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 6
            timeoutSeconds: 10

  # Route 100% of traffic to the latest revision.
  traffic:
    - percent: 100
      latestRevision: true