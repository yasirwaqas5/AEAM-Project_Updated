version: "3.9"

services:

  # 🔴 AEAM APP (MAIN SYSTEM)
  aeam-app:
    build: .
    container_name: aeam-app
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis
      - qdrant
    environment:
      DATABASE_URL: postgresql://postgres:secret@postgres:5432/postgres
      REDIS_URL: redis://redis:6379/0
      VECTOR_DB_URL: http://qdrant:6333
      ENVIRONMENT: production
      LLM_ENABLED: "true"
    restart: always

  # 🟦 POSTGRES
  postgres:
    image: postgres:15
    container_name: aeam-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  # 🟨 REDIS
  redis:
    image: redis:7
    container_name: aeam-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  # 🟩 QDRANT (VECTOR DB)
  qdrant:
    image: qdrant/qdrant
    container_name: aeam-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: always

# 💾 VOLUMES (PERSISTENCE)
volumes:
  postgres_data:
  redis_data:
  qdrant_data: